global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Next.js 应用指标
  - job_name: "saas-app"
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: /api/metrics

  # Prometheus 自身
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Grafana
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # Loki
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
