global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "wecom"

receivers:
  - name: "wecom"
    webhook_configs:
      # AlertManager → 企业微信 Bot
      # 需要中间层转发，见 monitoring/scripts/alert-to-wecom.py
      - url: "http://host.docker.internal:8080/alert"
        send_resolved: true
